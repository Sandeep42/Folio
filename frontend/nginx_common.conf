# Rate limiting zones — declared at http level, auto-included by nginx.
# This file intentionally contains NO server or location blocks.
limit_req_zone $binary_remote_addr zone=parse:10m   rate=6r/m;
limit_req_zone $binary_remote_addr zone=prices:10m  rate=2r/m;
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/m;
