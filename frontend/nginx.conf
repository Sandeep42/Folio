server {
    listen 80;
    server_name _;

    client_max_body_size 25m;
    client_body_timeout  30s;
    proxy_read_timeout   90s;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header Referrer-Policy        "strict-origin"  always;
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;

    root  /usr/share/nginx/html;
    index index.html;

    # Parse endpoints — 6 per minute per IP
    location ~ ^/api/(parse-cas|parse-xls|parse-kfin|parse-zerodha|parse-tradebook) {
        limit_req zone=parse burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Price refresh — 2 per minute per IP
    location /api/refresh-prices {
        limit_req zone=prices burst=2 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # All other API calls — 30 per minute per IP
    location /api/ {
        limit_req zone=general burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static assets — long cache
    location ~* \.(js|css|woff2?|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri /index.html;
    }
}

